{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoAFo | Lost & Found</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    {% include "add_ons/theme.js" %}
    {% include "add_ons/footer.css" %}

<style>
    @keyframes wave-move {
        0% { transform: translateX(0); }
        100% { transform: translateX(-50%); }
    }
    .animate-wave-1 {
        animation: wave-move 40s linear infinite;
        width: 200%; /* Make wave double width to loop smoothly */
    }
    .animate-wave-2 {
        animation: wave-move 65s linear infinite;
        width: 200%;
    }
    .handwritten-fade {
        overflow: hidden;
        white-space: nowrap;
        border-right: 2px solid transparent;
        width: 0;
        animation: typing 3s steps(40, end) forwards;
    }

    @keyframes typing {
        from { width: 0 }
        to { width: 100% }
    }
</style>
</head>
<body class="bg-white dark:bg-slate-950 overflow:hidden transition-colors duration-500">
    <div class="min-h-screen w-full relative bg-gradient-to-b from-blue-900 to-indigo-800 flex items-center justify-center p-4 z-0">
        <svg class="absolute bottom-0 left-0 w-full h-1/2 z-10" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320" preserveAspectRatio="none">
            <defs>
                <linearGradient id="wave-grad" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" style="stop-color:rgba(255,255,255,0.1);" />
                    <stop offset="100%" style="stop-color:rgba(255,255,255,0.01);" />
                </linearGradient>
            </defs>

            <!-- Three layers with different animation speeds -->
            <path class="animate-wave-1" fill="url(#wave-grad)" d="M0,192L120,192C240,192,480,192,720,202.7C960,213,1200,235,1320,245.3L1440,256L1440,320L1320,320C1200,320,960,320,720,320C480,320,240,320,120,320L0,320Z"></path>
            <path class="animate-wave-2 opacity-50" fill="url(#wave-grad)" d="M0,288L120,266.7C240,245,480,203,720,192C960,181,1200,203,1320,213.3L1440,224L1440,320L1320,320C1200,320,960,320,720,320C480,320,240,320,120,320L0,320Z"></path>
        </svg>
        <div class="max-w-7xl w-full mx-auto bg-white/95 backdrop-blur-sm rounded-[2.5rem] shadow-2xl overflow-hidden flex flex-col md:flex-row min-h-[85vh] z-10">
            {% block main_layout %}
            {% endblock %}
        </div>
    </div>

    <script>
        function toggleModal() {
            const modal = document.getElementById('reportModal');
            modal.classList.toggle('hidden');
        }
        function toggleDarkMode() {
            const html = document.documentElement;
            const themeToggle = document.getElementById('theme-toggle');
            const text = document.getElementById('theme-text');

            // If checkbox is CHECKED, we'll set Light Mode. If UNCHECKED, Dark Mode.
            // (You can swap this depending on your preference)
            if (themeToggle.checked) {
                html.classList.remove('dark');
                text.innerText = 'Light';
                localStorage.setItem('theme', 'light');
            } else {
                html.classList.add('dark');
                text.innerText = 'Dark';
                localStorage.setItem('theme', 'dark');
            }
        }

        // Logic to set the correct state on page load
        document.addEventListener('DOMContentLoaded', () => {
            const html = document.documentElement;
            const themeToggle = document.getElementById('theme-toggle');
            const text = document.getElementById('theme-text');
            const savedTheme = localStorage.getItem('theme');

            // 1. Determine if we should be in Dark Mode
            const isDark = savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches);

            // 2. Apply the class and sync the toggle position
            if (isDark) {
                html.classList.add('dark');
                if (themeToggle) themeToggle.checked = false; // Dark = Unchecked
                if (text) text.innerText = 'Dark';
            } else {
                html.classList.remove('dark');
                if (themeToggle) themeToggle.checked = true; // Light = Checked
                if (text) text.innerText = 'Light';
            }
        });
    </script>
    {% include "add_ons/footer.js" %}
</body>
<footer>
    {% include "partials/footer.html" %}
</footer>
</html>
