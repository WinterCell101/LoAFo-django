<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoAFo | Lost & Found</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    {% include "add_ons/theme.js" %}
</head>
<body class="bg-white dark:bg-slate-950 transition-colors duration-500">
    <div class="max-w-7xl mx-auto bg-white rounded-[2.5rem] shadow-2xl overflow-hidden flex flex-col md:flex-row min-h-[85vh]">
        {% block main_layout %}
        {% endblock %}
    </div>

    <script>
        function toggleModal() {
            const modal = document.getElementById('reportModal');
            modal.classList.toggle('hidden');
        }
        function toggleDarkMode() {
            const html = document.documentElement;
            const icon = document.getElementById('theme-icon');
            const text = document.getElementById('theme-text');

            //Toggle the 'dark' class on <html>
            html.classList.toggle('dark');
            const isDark = html.classList.contains('dark');

            //Save preference to localStorage
            localStorage.setItem('theme', isDark ? 'dark' : 'light');

            if (isDark) {
                icon.classList.replace('fa-sun', 'fa-moon');
                text.innerText = 'Dark';
            } else {
                icon.classList.replace('fa-moon', 'fa-sun');
                text.innerText = 'Light';
            }
        }
    // Logic to set the correct text/icon on page load
    document.addEventListener('DOMContentLoaded', () => {
        const isDark = document.documentElement.classList.contains('dark');
        const icon = document.getElementById('theme-icon');
        const text = document.getElementById('theme-text');

        if (isDark && icon && text) {
            icon.className = 'fa fa-sun text-sm';
            text.innerText = 'Dark';
        }
        });
    </script>
</body>
<footer>

</footer>
</html>
