
<!-- Wrapper Div (kept for layout consistency) -->
<div class="mt-auto p-4 border-t border-slate-100 dark:border-slate-800 flex justify-start items-center gap-3">
    <label class="relative inline-flex items-center cursor-pointer">
        <!-- 1. THE INPUT (The Peer) -->
        <input type="checkbox" id="theme-toggle" class="sr-only peer" onchange="toggleDarkMode()">

        <!-- 2. THE TRACK (Sibling to Input) -->
        <div class="w-14 h-7 bg-slate-200 dark:bg-slate-800 rounded-full border-2 border-slate-800 dark:border-slate-400
                    peer-checked:bg-blue-600 transition-all duration-300 flex items-center justify-between px-1.5 relative">

            <i class="fa fa-moon text-[10px] text-slate-500 dark:text-blue-200"></i>
            <i class="fa fa-sun text-[10px] text-yellow-500 opacity-0 dark:opacity-100 transition-opacity"></i>
        </div>

        <!-- 3. THE SLIDING CIRCLE (Also a Sibling to Input) -->
        <div class="absolute top-[3px] left-[4px] w-5 h-5 bg-slate-800 dark:bg-white rounded-full
                    transition-all duration-300 transform
                    peer-checked:translate-x-[28px]">
        </div>
    </label>

    <span id="theme-text" class="font-bold text-[10px] uppercase tracking-wider text-slate-600 dark:text-slate-300">Dark</span>
</div>
