<div id="reportModal" class="fixed inset-0 z-50 hidden flex items-center justify-center bg-slate-900/60 backdrop-blur-sm px-4">
    <div id="modalContent" class="bg-white w-full max-w-lg rounded-[2.5rem] shadow-2xl overflow-hidden relative flex flex-col max-h-[90vh]">

        <div class="p-8 pb-4 bg-white border-b border-slate-50">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black text-slate-800">New Report</h2>
                <button onclick="toggleModal('LOST')" class="text-slate-400 hover:text-rose-500"><i class="fa fa-times text-xl"></i></button>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-8 pt-4 custom-scrollbar">
            <div id="lostFormContainer">
                {% include 'partials/form_lost.html' %}
            </div>
        </div>
    </div>
</div>

<style>
    /* Nindot nga scrollbar para dili hugaw tan-awon */
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
</style>
<script>
    // Update the function to accept 'type' (either 'LOST' or 'FOUND')
    function toggleModal(type) {
        const modal = document.getElementById('reportModal');
        const content = document.getElementById('modalContent');
        const typeInput = document.getElementById('reportTypeInput');
        const typeHeader = document.querySelector('#modalContent h1');

        if (modal.classList.contains('hidden')) {
            // Set the hidden input value so Django knows what it is
            if (type) {
                typeInput.value = type;
                typeHeader.innerText = type + " ITEM";

                // Change color based on type (Optional but cool)
                if (type === 'FOUND') {
                    typeHeader.classList.replace('text-indigo-800', 'text-emerald-600');
                } else {
                    typeHeader.classList.replace('text-emerald-600', 'text-indigo-800');
                }
            }

            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.add('opacity-100');
                content.classList.replace('scale-95', 'scale-100');
                content.classList.replace('translate-y-10', 'translate-y-0');
            }, 10);
        } else {
            // Close logic...
        }
        document.body.style.overflow = 'auto';
    }

</script>
