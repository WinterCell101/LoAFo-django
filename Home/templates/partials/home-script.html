<script>
function showTab(tab) {
    const tabs = ['found', 'lost', 'claimed'];
    tabs.forEach(t => {
        const container = document.getElementById(`${t}-container`);
        const button = document.getElementById(`btn-${t}`);
        if (t === tab) {
            container?.classList.remove('hidden');
            button?.classList.add('bg-white', 'dark:bg-slate-700', 'shadow-sm', 'text-indigo-600');
            button?.classList.remove('text-slate-500', 'dark:text-slate-400');
        } else {
            container?.classList.add('hidden');
            button?.classList.remove('bg-white', 'dark:bg-slate-700', 'shadow-sm', 'text-indigo-600');
            button?.classList.add('text-slate-500', 'dark:text-slate-400');
        }
    });
}

// ---- DETAIL MODAL ----
let modalImages = [];
let currentModalIdx = 0;

function openDetailModal(id, imgUrls, title, subcategory, loc, exactLoc, owner, contact, desc) {
    const modal = document.getElementById('detailModal');
    const container = document.getElementById('modalImageContainer');
    const navButtons = document.getElementById('modalNavButtons');
    const dotsContainer = document.getElementById('modalDots');

    if (!modal) return;

    modalImages = Array.isArray(imgUrls) ? imgUrls.filter(Boolean) : [];
    currentModalIdx = 0;

    if (container) {
        container.innerHTML = '';
        if (dotsContainer) dotsContainer.innerHTML = '';

        if (modalImages.length > 0) {
            modalImages.forEach((url, index) => {
                const img = document.createElement('img');
                img.src = url;
                img.className = `modal-slide-img w-full h-full object-contain absolute inset-0 transition-opacity duration-400 ease-in-out ${index === 0 ? 'opacity-100' : 'opacity-0'}`;
                container.appendChild(img);

                // Dots
                if (dotsContainer && modalImages.length > 1) {
                    const dot = document.createElement('button');
                    dot.className = `w-2 h-2 rounded-full transition-all ${index === 0 ? 'bg-white' : 'bg-white/40'}`;
                    dot.onclick = () => goToModalSlide(index);
                    dotsContainer.appendChild(dot);
                }
            });
            if (navButtons) navButtons.classList.toggle('hidden', modalImages.length <= 1);
        } else {
            container.innerHTML = `<div class="text-slate-300 flex flex-col items-center">
                                        <i class="fa fa-image text-8xl mb-4"></i>
                                        <p class="font-bold uppercase tracking-widest">No Photo</p>
                                   </div>`;
            if (navButtons) navButtons.classList.add('hidden');
        }
    }

    const set = (elId, value, isHTML = false) => {
        const el = document.getElementById(elId);
        if (el) isHTML ? (el.innerHTML = value) : (el.textContent = value);
    };

    set('modalRef', `Reference #${id}`);
    set('modalTitle', title);
    set('modalSubcategory', subcategory || 'General Category');
    set('modalOwner', owner || 'N/A');
    set('modalContact', contact || 'N/A');
    set('modalDesc', desc || 'No details provided.');
    set('modalExactLoc', exactLoc || '');
    set('modalLoc', loc || '');

    modal.classList.remove('hidden');
    modal.classList.add('flex');
    document.body.style.overflow = 'hidden';

    const card = document.getElementById('detailModalCard');
    requestAnimationFrame(() => requestAnimationFrame(() => {
        card?.classList.remove('scale-95', 'opacity-0');
        card?.classList.add('scale-100', 'opacity-100');
    }));
}

function prevModalImg() { goToModalSlide(currentModalIdx - 1); }
function nextModalImg() { goToModalSlide(currentModalIdx + 1); }

function goToModalSlide(index) {
    const slides = document.querySelectorAll('.modal-slide-img');
    const dots = document.querySelectorAll('#modalDots button');
    if (slides.length <= 1) return;

    slides[currentModalIdx]?.classList.replace('opacity-100', 'opacity-0');
    dots[currentModalIdx]?.classList.replace('bg-white', 'bg-white/40');

    currentModalIdx = ((index % slides.length) + slides.length) % slides.length;

    slides[currentModalIdx]?.classList.replace('opacity-0', 'opacity-100');
    dots[currentModalIdx]?.classList.replace('bg-white/40', 'bg-white');
}

function closeDetailModal() {
    const modal = document.getElementById('detailModal');
    const card = document.getElementById('detailModalCard');
    card?.classList.remove('scale-100', 'opacity-100');
    card?.classList.add('scale-95', 'opacity-0');
    setTimeout(() => {
        modal?.classList.add('hidden');
        modal?.classList.remove('flex');
        document.body.style.overflow = 'auto';
    }, 250);
}

function handleModalOverlayClick(event) {
    if (event.target === document.getElementById('detailModal')) closeDetailModal();
}

// ---- CARD IMAGE SLIDER ----
const currentSlides = {};
function changeSlide(itemId, direction) {
    if (currentSlides[itemId] === undefined) currentSlides[itemId] = 0;
    const images = document.querySelectorAll(`.slider-img-${itemId}`);
    if (images.length <= 1) return;
    images[currentSlides[itemId]].classList.add('hidden');
    currentSlides[itemId] = (currentSlides[itemId] + direction + images.length) % images.length;
    images[currentSlides[itemId]].classList.remove('hidden');
}

// Keyboard navigation for modal
document.addEventListener('keydown', (e) => {
    const modal = document.getElementById('detailModal');
    if (!modal || modal.classList.contains('hidden')) return;
    if (e.key === 'Escape') closeDetailModal();
    if (e.key === 'ArrowLeft') prevModalImg();
    if (e.key === 'ArrowRight') nextModalImg();
});

// Fade out Django messages after 3s
setTimeout(() => {
    document.querySelectorAll('.django-message').forEach(m => {
        m.style.opacity = '0';
        setTimeout(() => m.remove(), 500);
    });
}, 3000);

// Scroll to top button
const topBtn = document.getElementById('scrollToTopBtn');
if (topBtn) {
    window.onscroll = function() {
        if (document.body.scrollTop > 400 || document.documentElement.scrollTop > 400) {
            topBtn.classList.remove('opacity-0', 'translate-y-10', 'pointer-events-none');
            topBtn.classList.add('opacity-100', 'translate-y-0');
        } else {
            topBtn.classList.add('opacity-0', 'translate-y-10', 'pointer-events-none');
            topBtn.classList.remove('opacity-100', 'translate-y-0');
        }
    };
    topBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
}
</script>
