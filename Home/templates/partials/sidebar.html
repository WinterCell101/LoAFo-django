<aside class="w-full md:w-72 p-8 border-r border-gray-100 bg-white">
    <div class="flex items-center space-x-4 mb-10">
        <div class="bg-indigo-600 p-2 rounded-xl text-white">
            <i class="fa-solid fa-magnifying-glass-location fa-lg"></i>
        </div>
        <h1 class="text-3xl font-black text-slate-800 tracking-tighter">Lo<span class="text-indigo-600">AFo</span></h1>
    </div>

    <button onclick="toggleModal()" class="w-full py-3 bg-indigo-600 hover:bg-indigo-900 text-white rounded-xl transition-all mb-8 flex items-center justify-center gap-2" style="font-size: 13px;">
    <i class="fa fa-plus"></i>
    <span class="font-bold whitespace-nowrap">Report Lost Item</span>
   </button>

   <nav class="space-y-4">
    <h3 class="font-bold text-slate-800 text-xs uppercase tracking-widest opacity-50">Locations</h3>

    <!-- This is your 'Reset' link to show everything -->
    <a href="/" class="block text-sm font-bold {% if not request.GET.location %}text-indigo-600{% else %}text-slate-500{% endif %}">
        All Places
    </a>

    <!-- INSERT THE DYNAMIC CODE HERE -->
    {% for loc in locations %}
        <a href="?location={{ loc }}"
           class="block text-sm font-bold capitalize {% if request.GET.location == loc %}text-indigo-600{% else %}text-slate-500{% endif %}">
            {{ loc }}
        </a>
    {% endfor %}
</nav>
</aside>
