<aside class="w-full md:w-72 p-8 border-r border-gray-300 dark:border-slate-800 bg-white dark:bg-slate-900 transition-colors duration-300">
    <div class="flex items-center space-x-4 mb-10">
        <div class="bg-indigo-600 p-2 rounded-xl text-white">
            <i class="fa-solid fa-magnifying-glass-location fa-lg"></i>
        </div>
        <h1 class="text-3xl font-black text-slate-800 dark:text-white tracking-tighter">Lo<span class="text-indigo-600">AFo</span></h1>
    </div>

    <button onclick="toggleModal()" class="w-full py-3 bg-indigo-600 hover:bg-indigo-900 text-white rounded-xl transition-all mb-8 flex items-center justify-center gap-2" style="font-size: 13px;">
    <i class="fa fa-plus"></i>
    <span class="font-bold whitespace-nowrap">Report Lost Item</span>
   </button>

    <nav class="space-y-4">
        <h3 class="font-bold text-slate-800a dark:text-slate-800 text-xs uppercase tracking-widest opacity-50">Locations</h3>

        <!-- This is your 'Reset' link to show everything -->
        <a href="?{% if request.GET.q %}q={{ request.GET.q }}{% endif %}"
           class="block text-sm font-bold {% if not request.GET.location %}text-indigo-600 dark:text-indigo-400{% else %}text-slate-500 dark:text-slate-400{% endif %}">
            All Places
        </a>

        <!-- INSERT THE DYNAMIC CODE HERE -->
        {% for loc in locations %}
            <a href="?location={{ loc }}{% if request.GET.q %}&q={{ request.GET.q }}{% endif %}{% if request.GET.tab %}&tab={{ request.GET.tab }}{% endif %}""
               class="block text-sm font-bold capitalize {% if request.GET.location == loc %}text-indigo-600 dark:text-indigo-400{% else %}text-slate-500 dark:text-slate-400{% endif %} hover:text-indigo-400 transition-all">
                {{ loc }}
            </a>
        {% endfor %}
    </nav>
</aside>
